<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هديتي | أرسل فرحتك في لحظة ❤️</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        flag: { red: '#D32F2F', green: '#006400', black: '#1A1A1A', white: '#FFFFFF' },
                        sand: { light: '#F4E7C3', gold: '#D4AF37' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F4E7C3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 2rem; width: 95%; max-width: 400px; padding: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); }
        .btn-3d { position: relative; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1rem; font-weight: 700; box-shadow: 0 6px 0 rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        .btn-3d-green { background: linear-gradient(180deg, #006400, #004d00); color: white; border-bottom: 5px solid #002e00; }
        .btn-3d-red { background: linear-gradient(180deg, #D32F2F, #B71C1C); color: white; border-bottom: 5px solid #8B0000; }
        .btn-3d-cyan { background: linear-gradient(180deg, #00BCD4, #0097A7); color: white; border-bottom: 5px solid #006064; }
        .btn-3d-gold { background: linear-gradient(180deg, #D4AF37, #B8860B); color: white; border-bottom: 5px solid #8A6D17; }
        .btn-3d-gray { background: #f3f4f6; color: #4b5563; border-bottom: 5px solid #d1d5db; }
        .camera-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .camera-box { width: 85%; max-width: 350px; aspect-ratio: 1/1; overflow: hidden; border-radius: 2rem; border: 6px solid #00BCD4; transform: scaleX(-1); }
        .eid-card-final { background: #fff; border: 12px double #D4AF37; border-radius: 2.5rem; overflow: hidden; position: relative; background-size: cover; background-position: center; }
        .timer-circle { width: 100px; height: 100px; border: 6px solid #f3f3f3; border-top: 6px solid #006400; border-radius: 50%; animation: spin 2s linear infinite; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-up { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const FIXED_LOGO_URL = "logo.png"; 
const ADMIN_WHATSAPP = "249999978684"; 

function SudanEidApp() {
    const [step, setStep] = useState('splash');
    const [credits, setCredits] = useState(2);
    const [formData, setFormData] = useState({ name: '', relation: '', gender: 'male', userImg: null, receiverImg: null, bgImg: null, receiptImg: null });
    const [showCamera, setShowCamera] = useState(false);
    const [selectedPackage, setSelectedPackage] = useState(null);
    const [timer, setTimer] = useState(300);
    const [isCounting, setIsCounting] = useState(false);

    const videoRef = useRef(null);
    const streamRef = useRef(null);
    const cardRef = useRef();

    useEffect(() => {
        let interval = null;
        if (isCounting && timer > 0) {
            interval = setInterval(() => setTimer((prev) => prev - 1), 1000);
        } else if (timer === 0) {
            setIsCounting(false);
            setCredits(selectedPackage.count);
            setStep('form');
            confetti();
        }
        return () => clearInterval(interval);
    }, [isCounting, timer]);

    const startCamera = async () => {
        try {
            setShowCamera(true);
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            streamRef.current = stream;
            if (videoRef.current) videoRef.current.srcObject = stream;
        } catch (err) { alert("افتح الكاميرا من الإعدادات"); setShowCamera(false); }
    };

    const capture = () => {
        const canvas = document.createElement("canvas");
        canvas.width = videoRef.current.videoWidth; canvas.height = videoRef.current.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(videoRef.current, 0, 0);
        setFormData({ ...formData, userImg: canvas.toDataURL("image/png") });
        if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
        setShowCamera(false);
    };

    const getSudaneseMsg = () => {
        const isMale = formData.gender === 'male';
        const list = {
            parent: isMale ? `يا ابوي ${formData.name}.. العيد مبارك عليك بالبهجة والسرور، ربنا يخليك لينا ذخر وسند. 🌙✨` : `يا يمة ${formData.name}.. العيد مبارك عليك بالبهجة والسرور، ربنا يخليك لينا ذخر وسند. 🌙✨`,
            friend: isMale ? `يا فردة ${formData.name}.. كل سنة وإنت طيب يا غالي، ودايماً تام ولام.. العيد بيك أحلى والله. 🎉` : `يا حبيبة ${formData.name}.. كل سنة وإنتي طيبة يا غالية، ودايماً تامة ولامة.. العيد بيكي أحلى. 🎉`,
            partner: isMale ? `زوجي وحبيبي ${formData.name}.. كل عيد وإنت معي، ربنا يديمك لي نعمة. ❤️` : `زوجتي وحبيبتي ${formData.name}.. كل سنة وإنتي عيدي وأجمل أقداري. ❤️`,
            other: isMale ? `عيدك مبارك يا حبيب ${formData.name}.. ربنا يتقبل الطاعات ويجعل أيامك كلها سعادة وبشرى.` : `عيدك مبارك يا غالية ${formData.name}.. ربنا يتقبل الطاعات ويجعل أيامك كلها سعادة وبشرى.`
        };
        return list[formData.relation] || list.other;
    };

    const handleDownload = () => {
        html2canvas(cardRef.current, { scale: 3, useCORS: true, backgroundColor: "#ffffff" })
        .then(canvas => {
            const link = document.createElement('a');
            link.download = `معايدة_${formData.name}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    };

    const handleShare = async () => {
        const canvas = await html2canvas(cardRef.current, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
        const dataUrl = canvas.toDataURL("image/png");
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], `eid_card.png`, { type: "image/png" });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'هديتي',
                    text: getSudaneseMsg(),
                });
            } catch (err) {
                handleDownload();
            }
        } else {
            handleDownload();
            alert("تم حفظ الكرت في جهازك، يمكنك الآن إرساله يدوياً في واتساب");
        }
    };

    const handleOpenWhatsApp = () => {
        const text = encodeURIComponent(`السلام عليكم خدمة عملاء "هديتي".. أريد تفعيل باقة (${selectedPackage.name}) بمبلغ (${selectedPackage.amount} ج.س).\nسأقوم بإرسال صورة تحويل "بنكك" الآن.`);
        window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${text}`, '_blank');
        setStep('waiting');
        setTimer(300);
        setIsCounting(true);
    };

    return (
        <div className="w-full flex flex-col items-center p-4">
            
            <div className="fixed top-4 left-4 bg-white/90 backdrop-blur p-2 px-4 rounded-full shadow-md border border-flag-green z-50 text-[10px] font-bold text-flag-green">
                الرصيد: {credits} رسايل
            </div>

            {showCamera && (
                <div className="camera-overlay p-4">
                    <div className="camera-box mb-8"><video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover"></video></div>
                    <div className="flex gap-6">
                        <button onClick={()=>setShowCamera(false)} className="bg-white/20 text-white px-8 py-2 rounded-xl">خلف</button>
                        <button onClick={capture} className="w-20 h-20 bg-white rounded-full border-4 border-flag-green text-4xl flex items-center justify-center">📸</button>
                    </div>
                </div>
            )}

            {step === 'splash' && (
                <div className="glass-panel text-center animate-up">
                    <div className="w-24 h-24 border-4 border-flag-gold rounded-full mx-auto mb-6 bg-white shadow-lg overflow-hidden flex items-center justify-center">
                        <img src={FIXED_LOGO_URL} className="w-full h-full object-cover" onError={(e) => { e.target.src = 'https://img.icons8.com/color/96/gift.png'; }} />
                    </div>
                    <h1 className="text-4xl font-amiri font-bold text-flag-green mb-1">هديتي</h1>
                    <p className="text-lg font-cairo text-gray-600 mb-6">أرسل فرحتك في لحظة ❤️</p>
                    <button onClick={()=>setStep('home')} className="btn-3d btn-3d-green w-full py-4 text-xl mt-4">ابدأ الآن 🚀</button>
                </div>
            )}

            {step === 'home' && (
                <div className="glass-panel text-center space-y-4 animate-up">
                    <h2 className="text-xl font-bold">داير تسوي شنو؟</h2>
                    <button onClick={()=>setStep('form')} className="btn-3d btn-3d-cyan w-full p-6 text-xl">🌾 زكاة الفطر</button>
                    <button onClick={()=>setStep('form')} className="btn-3d btn-3d-gold w-full p-6 text-xl">🎁 عيدية العيد</button>
                </div>
            )}

            {step === 'form' && (
                <div className="glass-panel space-y-4 animate-up">
                    <input type="text" placeholder="اسم المستلم" className="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-flag-green" onChange={(e)=>setFormData({...formData, name: e.target.value})} />
                    
                    <div className="flex gap-2">
                        <button onClick={()=>setFormData({...formData, gender: 'male'})} className={`flex-1 py-3 rounded-xl border-2 font-bold ${formData.gender === 'male' ? 'border-flag-green bg-green-50 text-flag-green' : 'border-gray-100 text-gray-400'}`}>👨 ذكر</button>
                        <button onClick={()=>setFormData({...formData, gender: 'female'})} className={`flex-1 py-3 rounded-xl border-2 font-bold ${formData.gender === 'female' ? 'border-flag-red bg-red-50 text-flag-red' : 'border-gray-100 text-gray-400'}`}>👩 أنثى</button>
                    </div>

                    <select className="w-full p-4 bg-gray-50 border rounded-xl font-bold" onChange={(e)=>setFormData({...formData, relation: e.target.value})}>
                        <option value="">يقرب لك شنو؟</option>
                        <option value="parent">أب / أم</option>
                        <option value="friend">صديق / فردة</option>
                        <option value="partner">زوج / زوجة 💍</option>
                        <option value="other">زول غالي</option>
                    </select>

                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={startCamera} className="btn-3d btn-3d-gray py-4 text-xs">📸 سيلفي</button>
                        <label className="btn-3d btn-3d-gray py-4 text-xs cursor-pointer">📁 صورة الشخص
                            <input type="file" className="hidden" accept="image/*" onChange={(e)=>setFormData({...formData, receiverImg: URL.createObjectURL(e.target.files[0])})} />
                        </label>
                    </div>

                    <label className={`btn-3d w-full py-4 text-sm block cursor-pointer border-2 border-dashed ${formData.bgImg ? 'bg-green-50 border-flag-green text-flag-green' : 'btn-3d-gold'}`}>
                        {formData.bgImg ? "✅ تم تغيير الخلفية" : "🖼️ رفع خلفية مخصصة للكرت"}
                        <input type="file" className="hidden" accept="image/*" onChange={(e)=>setFormData({...formData, bgImg: URL.createObjectURL(e.target.files[0])})} />
                    </label>

                    <label className="block p-3 border-2 border-dashed border-gray-200 rounded-xl text-center cursor-pointer text-[10px] font-bold text-gray-400">
                        {formData.receiptImg ? "✅ إيصال الواجب جاهز" : "📄 إرفاق إيصال واجب (اختياري)"}
                        <input type="file" className="hidden" accept="image/*" onChange={(e)=>setFormData({...formData, receiptImg: URL.createObjectURL(e.target.files[0])})} />
                    </label>

                    <button onClick={()=>{ if(credits>0){ setCredits(credits-1); setStep('result'); confetti(); } else setStep('packages'); }} className="btn-3d btn-3d-green w-full py-4 text-lg">إنشاء الكرت ✨</button>
                </div>
            )}

            {step === 'result' && (
                <div className="max-w-[400px] w-full text-center space-y-6 animate-up">
                    <div ref={cardRef} className="eid-card-final p-4 shadow-2xl">
                        <div className="p-6 border-4 border-double border-flag-gold rounded-[2rem] flex flex-col items-center bg-white/80">
                            <div className="flex -space-x-8 mb-4">
                                {formData.userImg && <img src={formData.userImg} className="w-24 h-24 rounded-full border-4 border-flag-red object-cover z-20 shadow-lg"/>}
                                {formData.receiverImg && <img src={formData.receiverImg} className="w-24 h-24 rounded-full border-4 border-flag-green object-cover z-10 translate-y-4 shadow-lg"/>}
                            </div>
                            <h4 className="font-amiri font-bold text-flag-red text-3xl mb-1">{formData.name}</h4>
                            <p className="font-cairo text-flag-black font-bold italic leading-relaxed px-2 mb-6 text-sm">"{getSudaneseMsg()}"</p>
                            {formData.receiptImg && <img src={formData.receiptImg} className="w-full h-40 object-contain rounded-lg border-2 border-dashed border-flag-green p-1 bg-white" />}
                        </div>
                    </div>
                    <button onClick={handleShare} className="btn-3d btn-3d-green w-full py-4 text-xl">🚀 مشاركة عبر واتساب</button>
                </div>
            )}

            {step === 'packages' && (
                <div className="glass-panel text-center space-y-4 animate-up">
                    <h2 className="text-xl font-bold text-flag-red">الرسايل خلصت! 😉</h2>
                    <button onClick={()=>{setSelectedPackage({name:'الواجب', count:10, amount:'5,000'}); setStep('pay');}} className="btn-3d btn-3d-cyan w-full p-4 flex justify-between font-bold"><span>باقة الواجب (10)</span> <span>5,000 ج.س</span></button>
                    <button onClick={()=>{setSelectedPackage({name:'العيلة', count:50, amount:'15,000'}); setStep('pay');}} className="btn-3d btn-3d-gold w-full p-4 flex justify-between font-bold"><span>باقة العيلة (50)</span> <span>15,000 ج.س</span></button>
                </div>
            )}

            {step === 'pay' && (
                <div className="glass-panel text-center space-y-6 animate-up">
                    <div>
                        <h2 className="font-bold text-xl mb-2 text-flag-black">تفعيل {selectedPackage.name}</h2>
                        <div className="bg-white border-2 border-flag-green p-4 rounded-2xl shadow-inner">
                            <p className="text-gray-500 text-sm mb-1">حول مبلغ <b>{selectedPackage.amount} ج.س</b> لـ:</p>
                            <p className="text-2xl font-bold text-flag-green tracking-widest">3183716</p>
                            <p className="text-[10px] font-bold text-gray-400 mt-1 uppercase">بنك الخرطوم | بنكك</p>
                        </div>
                    </div>

                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-100">
                        <p className="text-sm text-yellow-700 font-bold leading-relaxed">
                            💡 بعد التحويل، اضغط الزر أدناه لإرسال صورة الإشعار للأدمن في واتساب لتفعيل حسابك فوراً.
                        </p>
                    </div>

                    <button onClick={handleOpenWhatsApp} className="btn-3d btn-3d-red w-full py-5 text-lg">إرسال التحويل لواتساب 💬</button>
                    <button onClick={()=>setStep('packages')} className="text-gray-400 text-sm font-bold">رجوع للباقات</button>
                </div>
            )}

            {step === 'waiting' && (
                <div className="glass-panel text-center space-y-6 animate-up">
                    <div className="timer-circle"><span className="text-flag-green font-bold">{Math.floor(timer/60)}:{timer%60<10?'0':''}{timer%60}</span></div>
                    <h2 className="font-bold">انتظار التأكيد..</h2>
                    <p className="text-xs text-gray-500">يرجى إرسال صورة إشعار "بنكك" في محادثة الواتساب المفتوحة الآن. سيقوم الأدمن بإضافة الرصيد لك فور استلام الصورة.</p>
                </div>
            )}

            <footer className="mt-8 text-[10px] text-gray-500 font-bold uppercase text-center">هديتي | 2026</footer>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SudanEidApp />);
</script>
</body>
</html>
